name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: Frontend build + typecheck
  # ============================================================
  frontend:
    name: "Frontend (Vite + TS)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: TypeScript typecheck
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build (Vite)
        run: |
          cd frontend
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ============================================================
  # Job 2: Sidecar typecheck + cross-compile to Windows
  # ============================================================
  sidecar:
    name: "Sidecar (Bun + TS)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd sidecar
          bun install

      - name: TypeScript typecheck
        run: |
          cd sidecar
          bun run typecheck

      - name: Cross-compile sidecar → Windows exe
        run: |
          mkdir -p sidecars
          cd sidecar
          bun build --compile --target=bun-windows-x64 \
            --outfile=../sidecars/claude-sidecar-x86_64-pc-windows-msvc.exe \
            ./src/index.ts

      - name: Upload sidecar binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-exe
          path: sidecars/claude-sidecar-x86_64-pc-windows-msvc.exe
          retention-days: 1

  # ============================================================
  # Job 3: Go backend — needs frontend + sidecar for real assets
  # ============================================================
  backend:
    name: "Go Backend"
    needs: [frontend, sidecar]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-exe
          path: sidecars/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build (Windows amd64)
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -o build/ai_tools.exe -ldflags="-s -w" .

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: ai-tools-windows-amd64
          path: |
            build/ai_tools.exe
            frontend/dist/
            sidecars/
          retention-days: 7
