name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: Frontend build + typecheck
  # ============================================================
  frontend:
    name: "Frontend (Vite + TS)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: TypeScript typecheck
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build (Vite)
        run: |
          cd frontend
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ============================================================
  # Job 2: Sidecar typecheck
  # ============================================================
  sidecar:
    name: "Sidecar (Bun + TS)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd sidecar
          bun install

      - name: TypeScript typecheck
        run: |
          cd sidecar
          bun run typecheck

  # ============================================================
  # Job 3: Go backend build (cross-compile to Windows)
  # ============================================================
  backend:
    name: "Go Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build (Windows amd64)
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -o build/ai_tools.exe -ldflags="-s -w" .

      - name: Build (Linux amd64, for CI verify)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -o build/ai_tools_linux -ldflags="-s -w" .

      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: build/
          retention-days: 1

  # ============================================================
  # Job 4: Assemble full output (depends on frontend + backend)
  # ============================================================
  assemble:
    name: "Assemble"
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: build/

      - name: Package release
        run: |
          mkdir -p release/ai-tools
          cp build/ai_tools.exe release/ai-tools/
          cp -r frontend/dist release/ai-tools/
          cd release
          zip -r ai-tools-windows-amd64.zip ai-tools/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-tools-windows-amd64
          path: release/ai-tools-windows-amd64.zip
          retention-days: 7
